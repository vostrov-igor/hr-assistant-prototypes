<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR-ассистент — прототипы</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 48px 24px; color: #1a1a1a; }
    .wrap { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
    .subtitle { color: #666; font-size: 15px; margin-bottom: 40px; }
    .list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
    .list a { display: flex; align-items: center; gap: 16px; padding: 20px 24px; background: #fff; border-radius: 12px; text-decoration: none; color: inherit; border: 1px solid #e8e8e8; transition: box-shadow .15s; }
    .list a:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .icon { font-size: 24px; flex-shrink: 0; }
    .info strong { display: block; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .info span { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>HR-ассистент — прототипы</h1>
    <p class="subtitle">Прототипы для тестирования с рекрутерами. Для обратной связи — пиши напрямую.</p>
    <ul class="list">
      <li>
        <a href="response-review/">
          <span class="icon">📋</span>
          <div class="info">
            <strong>Разбор откликов</strong>
            <span>Скоринг, отказы, работа с очередью откликов</span>
          </div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
